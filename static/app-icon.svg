<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>
  
  <!-- Minimalist server stack - 3 simple horizontal lines -->
  <rect x="32" y="38" width="64" height="8" rx="4" fill="#667eea"/>
  <rect x="32" y="60" width="64" height="8" rx="4" fill="#764ba2"/>
  <rect x="32" y="82" width="64" height="8" rx="4" fill="#667eea"/>
  
  <!-- Simple control indicator - single circle -->
  <circle cx="64" cy="64" r="16" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
  <circle cx="64" cy="64" r="6" fill="#667eea"/>
  
  <!-- Minimal dots at ends -->
  <circle cx="40" cy="42" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="40" cy="64" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="40" cy="86" r="3" fill="#fff" opacity="0.8"/>
</svg>