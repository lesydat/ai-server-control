<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Server Control</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .refresh-select {
            padding: 8px 16px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .refresh-select:hover {
            border-color: #667eea;
        }
        
        .refresh-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .refresh-btn:hover { opacity: 0.9; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2a2a4a;
        }
        
        .card.offline {
            opacity: 0.6;
            border-color: #ef444455;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-subtitle {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
            margin-left: 32px;
        }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-online { background: #10b981; color: #fff; }
        .status-offline { background: #ef4444; color: #fff; }
        .status-error { background: #f59e0b; color: #fff; }
        
        .model-list {
            list-style: none;
            margin-bottom: 15px;
        }
        
        .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #252540;
            border-radius: 10px;
            margin-bottom: 8px;
            gap: 12px;
        }
        
        .model-item:last-child { margin-bottom: 0; }
        
        .model-name {
            font-weight: 500;
            color: #e0e0e0;
            font-size: 0.9rem;
            word-break: break-word;
            text-align: left;
        }
        
        .model-status {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            flex-shrink: 0;
            vertical-align: middle;
        }
        
        .model-loaded { background: #10b98133; color: #10b981; }
        .model-running { background: #667eea33; color: #667eea; }
        .model-loading { background: #f59e0b33; color: #f59e0b; }
        .model-idle { background: #6b728033; color: #9ca3af; }
        .model-available { background: #10b98133; color: #10b981; }
        
        .memory-bar {
            background: #252540;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
        }
        
        .memory-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        .memory-label { color: #888; }
        .memory-value { color: #667eea; font-weight: 600; }
        
        .memory-track {
            background: #1a1a2e;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        
        .memory-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a4a;
            font-size: 0.85rem;
        }
        
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; }
        .info-value { font-weight: 500; }
        
        .error-msg {
            background: #ef444433;
            border: 1px solid #ef444455;
            border-radius: 8px;
            padding: 12px;
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        
        .last-update {
            text-align: center;
            color: #666;
            margin-top: 25px;
            font-size: 0.85rem;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><img src="/static/app-icon.svg" width="32" height="32" style="vertical-align:middle"> AI Server Control</h1>
    </div>
    
    <div class="controls">
        <select id="refreshInterval" class="refresh-select">
            <!-- Options populated by JS from /config -->
        </select>
        <button class="refresh-btn" onclick="fetchStatus()">🔄 Refresh</button>
    </div>
    
    <div class="grid" id="serverGrid">
        <p style="text-align: center; color: #888; grid-column: 1/-1;">
            <span class="loading"></span> Loading...
        </p>
    </div>
    
    <p class="last-update" id="lastUpdate">Last updated: --</p>
    
    <script>
        let refreshTimer = null;
        let currentInterval = 2;
        
        // Load config and saved interval
        const savedInterval = localStorage.getItem('ai-monitor-refresh');
        fetch('/config')
            .then(r => r.json())
            .then(config => {
                const select = document.getElementById('refreshInterval');
                select.innerHTML = config.refresh_intervals.map(v => 
                    `<option value="${v}"${v === config.default_refresh ? ' selected' : ''}>Auto refresh: ${v}s</option>`
                ).join('');
                // Override with saved value if exists
                if (savedInterval && config.refresh_intervals.includes(parseInt(savedInterval))) {
                    select.value = savedInterval;
                }
                currentInterval = parseInt(select.value);
                startAutoRefresh();
                fetchStatus();
            })
            .catch(() => fetchStatus());
        
        document.getElementById('refreshInterval').addEventListener('change', (e) => {
            currentInterval = parseInt(e.target.value);
            localStorage.setItem('ai-monitor-refresh', currentInterval);
            startAutoRefresh();
        });
        
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(fetchStatus, currentInterval * 1000);
        }
        
        function formatBytes(bytes) {
            if (!bytes) return 'N/A';
            const gb = bytes / (1024**3);
            return `${gb.toFixed(1)} GB`;
        }
        
        function getStatusIcon(type) {
            const icons = {
                'ollama': '<img src="/static/ollama.svg" width="24" height="24" style="vertical-align:middle">',
                'llamacpp': '<img src="/static/llamacpp.png" width="24" height="24" style="vertical-align:middle">',
                'omlx': '<img src="/static/omlx.svg" width="24" height="24" style="vertical-align:middle">'
            };
            return icons[type] || '<img src="/static/omlx.svg" width="24" height="24" style="vertical-align:middle">';
        }
        
        function fetchStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    renderServers(data.servers);
                    document.getElementById('lastUpdate').textContent = 
                        'Last updated: ' + new Date().toLocaleTimeString();
                })
                .catch(err => {
                    document.getElementById('serverGrid').innerHTML = 
                        `<p style="color: #ef4444; text-align: center; grid-column: 1/-1;">Error: ${err}</p>`;
                });
        }
        
        function renderServers(servers) {
            const grid = document.getElementById('serverGrid');
            grid.innerHTML = servers.map(server => {
                const statusClass = server.status === 'online' ? 'status-online' : 
                                   server.status === 'error' ? 'status-error' : 'status-offline';
                const cardClass = server.status !== 'online' ? 'offline' : '';
                
                // Sort models: first by load_status (loading -> loaded -> unloaded), then alphabetically
                const loadOrder = { loading: 0, loaded: 1, unloaded: 2 };
                const sortedModels = [...server.models].sort((a, b) => {
                    const orderA = loadOrder[a.load_status] ?? 99;
                    const orderB = loadOrder[b.load_status] ?? 99;
                    if (orderA !== orderB) return orderA - orderB;
                    return a.id.localeCompare(b.id);
                });
                
                const modelItems = sortedModels.map(m => {
                    // Load status with different icons
                    const loadClass = m.load_status === 'loaded' ? 'model-loaded' :
                                     m.load_status === 'loading' ? 'model-loading' : 'model-idle';
                    const loadText = m.load_status === 'loaded' ? '● Loaded' :
                                    m.load_status === 'loading' ? '◐ Loading' : '○ Unloaded';
                    
                    // Activity status on second line (only show if available)
                    let activityLine = '';
                    if (m.activity_status) {
                        const actClass = m.activity_status === 'active' ? 'model-running' : 'model-idle';
                        const actText = m.activity_status === 'active' ? '⚡ Active' : '💤 Idle';
                        activityLine = `<br><span class="model-status ${actClass}" style="margin-left:0;margin-top:4px;display:inline-block;font-size:0.85em">${actText}</span>`;
                    }
                    
                    return `<li class="model-item">
                        <span class="model-name" title="${m.id}">${m.id}</span>
                        <span class="model-status ${loadClass}">${loadText}${activityLine}</span>
                    </li>`;
                }).join('');
                
                let memoryHtml = '';
                if (server.total_memory && server.used_memory) {
                    const percent = (server.used_memory / server.total_memory * 100).toFixed(1);
                    memoryHtml = `<div class="memory-bar">
                        <div class="memory-header">
                            <span class="memory-label">Memory</span>
                            <span class="memory-value">${formatBytes(server.used_memory)} / ${formatBytes(server.total_memory)}</span>
                        </div>
                        <div class="memory-track">
                            <div class="memory-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>`;
                }
                
                let errorHtml = '';
                if (server.error) {
                    errorHtml = `<div class="error-msg">⚠️ ${server.error}</div>`;
                }
                
                return `<div class="card ${cardClass}">
                    <div class="card-header">
                        <div>
                            <span class="card-title">${getStatusIcon(server.type)} ${server.name}</span>
                            <div class="card-subtitle">
                                ${server.type_name}
                            </div>
                        </div>
                        <span class="status-badge ${statusClass}">${server.status.toUpperCase()}</span>
                    </div>
                    <ul class="model-list">${modelItems || '<li style="color:#888;padding:12px">No models</li>'}</ul>
                    ${memoryHtml}
                    <div class="info-row">
                        <span class="info-label">Endpoint</span>
                        <span class="info-value">${server.endpoint}</span>
                    </div>
                    ${errorHtml}
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
